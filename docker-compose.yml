services:
  postgres:
    image: postgres:16-alpine
    container_name: uslugpol-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: uslugpol
      POSTGRES_PASSWORD: uslugpol
      POSTGRES_DB: uslugpol
    ports:
      - "5432:5432"
    volumes:
      - uslugpol_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uslugpol -d uslugpol"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  uslugpol_postgres_data:
